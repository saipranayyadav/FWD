<!DOCTYPE html>
<html>
<head>
<style>
.container {
  display: grid;
  grid-template-columns: auto auto auto;
  grid-template-rows: 80px 200px;  ;
  background-color: blue;
  padding: 20px;
  column-gap: 50px;
  
}
.container div {
  background-color: lightpink;
  border: 5px solid purple;
  padding: 10px;
  font-size: 30px;
  text-align: center;
}
</style>
</head>
<body>

<h1>Grid Layout</h1>

<div class="container">
  <div>1</div>
  <div>2</div>
  <div>3</div>  
  <div>4</div>
  <div>5</div>
  <div>6</div>
</div>

</body>
</html>
