<!DOCTYPE html>
<html>
<body>

<h2>Simple Addition Callback Example</h2>

<button onclick="startAddition()">Add 5 + 7</button>

<h3 id="output"></h3>

<script>

    // Main Function
    function add(a, b, callback) {
        let sum = a + b;
        callback(sum);
    }

    // Callback Function
    function displayResult(result) {
        document.getElementById("output").innerHTML =
            "Sum = " + result;
    }

    function startAddition() {
        add(5, 7, displayResult);
    }

</script>

</body>
</html>
