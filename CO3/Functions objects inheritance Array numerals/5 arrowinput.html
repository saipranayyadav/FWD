<html>
<body>
    <h2>Arrow Function - Product of Two Numbers</h2>
    Enter First Number a:
    <input type="number" id="a"><br><br>

    Enter Second Number b:
    <input type="number" id="b"><br><br>
    <button onclick="Product()">Multiply</button>
    <h1 id="result"></h1>
<script>
    const Product = (a, b) => {
        let n1 = Number(document.getElementById("a").value);
        let n2 = Number(document.getElementById("b").value);

        let result=n1 * n2;

        document.getElementById("result").innerHTML =
            "Product = " + result;
    }
</script>
</body>
</html>
