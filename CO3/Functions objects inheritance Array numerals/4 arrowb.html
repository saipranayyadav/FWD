<html>
<body>
    <h2>JavaScript  Arrow Function Example</h2>
    
    <button onclick="product(5,6)"> Arrow Function product(5,6)</button> <br><br>
     <button onclick="product(10,20)">Arrow Function product(10,20)</button>
    <h1 id="output"></h1>

<script>
        const product = (a, b) => {
    let result=a * b;
    document.getElementById("output").innerHTML = 
            "Product = " + result;
  };
</script>

</body>
</html>
