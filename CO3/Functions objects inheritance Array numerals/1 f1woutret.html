<html>
<body>
    <h1>JavaScript Function Examples</h1>

<!-- Function without parameters Button -->
<button onclick="greet()">greet Function</button>
<br><br>
<!-- Function with parameters Button -->
<button onclick="add(10,20)">Add   Function 1 (10+20)</button>
<br><br>
<button onclick="add(100,200)">Add   Function 2 (100,200)</button>
<br><br>
 <script>
    function greet(){
    document.write("Hello Students!");
}
function add(a,b){
    c=a+b;
    document.write(a+"+"+b+"="+c);
}
</script>
<br>
</body>
</html>
