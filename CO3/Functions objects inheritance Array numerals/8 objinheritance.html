<!DOCTYPE html>
<html>
<body>

<h2>Inheritance Example</h2>
<button onclick="showDetails()">Show Details</button>
<h1 id="output"></h1>

<script>

// Parent Class
class Person {
    constructor(name,rollno) {
        this.name = name;
        this.rollno=rollno;
    }

    greet() {
        return "Hello " + this.name + "&nbsp"+ this.rollno;
    }
}

// Child Class
class Student extends Person {
    constructor(name,rollno,course) {
        super(name,rollno);
        this.course = course;
    }

    details() {
        return this.name + "&nbsp"+this.rollno+ " studies " + this.course;
    }
}

let s1 = new Student("Srinivas",123, "CSE");

function showDetails() {
    document.getElementById("output").innerHTML =
        s1.greet() + "<br>" + s1.details();
}

</script>

</body>
</html>
