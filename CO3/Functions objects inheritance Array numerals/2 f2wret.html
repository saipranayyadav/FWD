<html>
<body>
    <h2>JavaScript Function Examples</h2>
    <!-- Function without parameters Button -->
    <button onclick="showGreet()">
        Normal Function</button>
    <br><br>

    <!-- Function with parameters Button -->
    <button onclick="showAdd(10,20)">
        Add Function 1 (10 + 20)</button>
    <br><br>

    <button onclick="showAdd(100,200)">
        Add Function 2 (100 + 200)</button>
    <br><br>
    <h1 id="output"></h1>
<script>
    // Normal Function without parameters
    function greet(){
        return "Hello Students!";
    }
    function showGreet(){
       
        document.getElementById("output").innerHTML = greet();
    }
    // Function with parameters
    function add(a,b){
        let c = a + b;   // Proper variable declaration
        return c;
    }

    function showAdd(x,y){
        let result = add(x,y);
        document.getElementById("output").innerHTML = 
            "Sum = " + result;
    }
</script>

</body>
</html>
